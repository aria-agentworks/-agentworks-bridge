name: Zero-Step Factory Reset
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  factory-reset:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear tasks.txt
        run: |
          echo "Clearing tasks.txt file on self-hosted runner..."
          echo "" > tasks.txt
          echo "tasks.txt has been cleared."

      - name: Verify tasks.txt is empty
        run: |
          cat tasks.txt
          echo "Factory reset complete - tasks.txt cleared on self-hosted runner."
