name: DO Bridge - Zero-Step Final

on:
  workflow_dispatch:
  push:
    paths:
      - 'tasks.txt'

permissions:
  contents: write
  actions: write
  pull-requests: write
  id-token: write
  security-events: write
  checks: write

jobs:
  do-bridge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create DigitalOcean Droplet
        id: create-droplet
        env:
          DO_TOKEN: dop_v1_8e94e5a9538c6422204735c0feede764ada51d69dad1dc8507d3e3c578dc4ef7
        run: |
          TOKEN="${{ env.GITHUB_TOKEN }}"
          curl -s -X POST https://api.digitalocean.com/v2/droplets \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name" : "aria-host-droplet",
              "region" : "nyc3",
              "size" : "s-2vcpu-4gb",
              "image" : "ubuntu-22-04-x64",
              "user_data" : ""
            }'
          sleep 120

      - name: Get Droplet IP
        env:
          DO_TOKEN: dop_v1_8e94e5a9538c6422204735c0feede764ada51d69dad1dc8507d3e3c578dc4ef7
        run: |
          IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets?page=1&per_page=100" -H "Authorization: Bearer $DO_TOKEN" | python3 -c "import sys, json; d=json.load(sys.stdin); print([x['public_ips'][0] for x in d['droplets'] if x['name']=='aria-host-droplet'][0])")
          echo "IP=$IP" >> $GITHUB_ENV

      - name: Write Results
        run: |
          echo "=== DO DROPLET CREATED ===" >> result.txt
          echo "Droplet Name: aria-host-droplet" >> result.txt
          echo "Public IP: $IP" >> result.txt
          echo "=== READY ===" >> result.txt
          echo "=== GPTL-TEAMS DEPLOYMENT READY ===" >> result.txt

      - name: Commit and push results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "DO droplet deployed" || echo "Skip commit"
          git push || echo "Skip push"
