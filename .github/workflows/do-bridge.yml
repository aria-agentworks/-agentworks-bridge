name: DO Bridge - Zero-Step Final

on:
  workflow_dispatch:
  push:
    paths:
      - 'tasks.txt'

jobs:
  do-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get GitHub Actions runner token
        id: get-token
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tokenData = await github.rest.actions.createRegistrationTokenForRepo({
              owner: 'aria-agentworks',
              repo: '-agentworks-bridge'
            });
            core.setOutput('token', tokenData.data.token);
            core.setOutput('expires_at', tokenData.data.expires_at);
            console.log('Token generated:', tokenData.data.token.substring(0, 20));

      - name: Create DigitalOcean Droplet
        id: create-droplet
        env:
          DO_TOKEN: dop_v1_e9969621c05a14ef05b088fcc44681c9710c5270cbab2aeb918efbb2f7fbada3
          RUNNER_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          TOKEN="$RUNNER_TOKEN"
          curl -s -X POST https://api.digitalocean.com/v2/droplets \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "aria-ghost-droplet",
              "region": "nyc3",
              "size": "s-2vcpu-4gb",
              "image": "ubuntu-22-04-x64",
              "user_data": "'"'"'#!/bin/bash\nset -e\napt-get update\napt-get install -y docker.io git python3-pip curl wget\ncd /home/ubuntu\nmkdir actions-runner\ncd actions-runner\ncurl -o actions-runner-linux-x64-2.316.1.tar.gz -L https://github.com/actions/runner/releases/download/v2.316.1/actions-runner-linux-x64-2.316.1.tar.gz\ntar xzf ./actions-runner-linux-x64-2.316.1.tar.gz\n./config.sh --url https://github.com/aria-agentworks/-agentworks-bridge --token $TOKEN --name aria-ghost-runner --unattended\n./svc.sh install\nsystemctl enable actions-runner\nsystemctl start actions-runner\necho $?'"'"'
            }' | python3 -c "import sys, json; d=json.load(sys.stdin); print('Droplet ID:', d['droplet']['id'])"
          sleep 120

      - name: Get Droplet IP
        env:
          DO_TOKEN: dop_v1_e9969621c05a14ef05b088fcc44681c9710c5270cbab2aeb918efbb2f7fbada3
        run: |
          IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets?page=1&per_page=100" -H "Authorization: Bearer $DO_TOKEN" | python3 -c "import sys, json; d=json.load(sys.stdin); print([x['public_ips'][0] for x in d['droplets'] if x['name']=='aria-ghost-droplet'][0])")
          echo "IP=$IP" >> $GITHUB_ENV

      - name: Write Results
        run: |
          echo "=== DO DROPLET CREATED ===" > result.txt
          echo "Droplet Name: aria-ghost-droplet" >> result.txt
          echo "Public IP: $IP" >> result.txt
          echo "=== READY ===" >> result.txt
          echo "=== GPT-PP-TEAM DEPLOYMENT READY ===" >> result.txt

      - name: Commit and push results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "DO droplet deployed" || echo "Skip commit"
          git push || echo "Skip push"
