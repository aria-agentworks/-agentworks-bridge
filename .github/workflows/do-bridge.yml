name: DO Bridge - Zero-Step Deployment
on:
  workflow_dispatch:
  push:
    paths:
      - 'tasks.txt'
jobs:
  create-droplet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install doctl
        run: |
          curl -sL https://github.com/digitalocean/doctl/releases/download/v1.112.1/doctl-1.112.1-linux-amd64.tar.gz | tar xz
          sudo mv ./bin/doctl /usr/local/bin/
          doctl version

      - name: Generate GitHub Actions runner token
        id: runner-token
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tokenData = await github.rest.actions.createOrganizationRunnerToken({
              owner: 'aria-agentworks',
              repo: '-agentworks-bridge'
            });
            core.setOutput('token', tokenData.data.token);
            core.setOutput('expires_at', tokenData.data.expires_at);

      - name: Create DigitalOcean Droplet
        env:
          DO_TOKEN: dop_v1_e9969621c05a14ef05b088fcc44681c9710c5270cbab2aeb918efbb2f7fbada3
          RUNNER_TOKEN: ${{ steps.runner-token.outputs.token }}
        run: |
          TOKEN=$RUNNER_TOKEN
          USER_DATA='#!/bin/bash
          set -e
          
          # Update and install dependencies
          apt-get update
          apt-get install -y docker.io git python3-pip curl wget
          
          # Download and extract GitHub Actions runner
          cd /home/ubuntu
          mkdir actions-runner
          cd actions-runner
          curl -o actions-runner-linux-x64-2.316.1.tar.gz -L https://github.com/actions/runner/releases/download/v2.316.1/actions-runner-linux-x64-2.316.1.tar.gz
          tar xzf ./actions-runner-linux-x64-2.316.1.tar.gz
          rm actions-runner-linux-x64-2.316.1.tar.gz
          
          # Configure and install runner
          ./config.sh --url https://github.com/aria-agentworks/-agentworks-bridge --token "$TOKEN" --name aria-ghost-runner --unattended
          ./svc.sh install
          systemctl enable actions-runner
          systemctl start actions-runner
          
          echo "=== DOCKER-UP STATUS ==="
          systemctl status actions-runner -l
          '
          
          doctl compute droplet create aria-ghost-droplet \
            --region nyc3 \
            --size s-2vcpu-4gb \
            --image ubuntu-22-04-x64 \
            --user-data "$USER_DATA" \
            --wait

      - name: Wait for Droplet to be ready
        run: |
          echo 'Waiting for droplet to be ready...'
          sleep 120

      - name: Get Droplet IP
        env:
          DO_TOKEN: dop_v1_e9969621c05a14ef05b088fcc44681c9710c5270cbab2aeb918efbb2f7fbada3
        run: |
          IP=$(doctl compute droplet list --format ID,PublicIPv4 --no-header | grep aria-ghost-droplet | awk '{print $2}')
          echo "=== DROplet CREATED ==="
          echo "Droplet Name: aria-ghost-droplet"
          echo "IP Address: $IP"
          echo "=== READY ===" >> result.txt
          echo "$IP" >> result.txt
          echo "=== GPT-PP-TEAM DEPLOYMENT READY ===" >> result.txt

      - name: Commit and push results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "DO droplet deployed" || echo "No changes"
          git push
