name: Deploy Bridge VM with n8l

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Azure Region'
        required: true
        default: 'centralindia'
        type: choice
        options:
          - eastus
          - centralindia
          - westeurope

env:
  FORCEF_JAVASCRIPT_ACTIONS_TO_NODE2: 'true'
  AZURE_RESOURCE_GROUP: bridge-rg-${{ github.run_id }}
  AZURE_VM_NAME: bridge-vm-${{ github.run_id }}
  AZURE_LOCATION: ${{ github.event.inputs.region || 'centralindia' }}

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    outputs:
      vm-public-ip: ${{ steps.get-ip.outputs.public-ip }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Setup Infrastructure
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.AZURE_LOCATION }}
            az vm create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_VM_NAME }} \
              --image Ubuntu2204 \
              --size Standard_B1s \
              --admin-password "AgentWorks@2026!" \
              --authentication-type password \
              --location ${{ env.AZURE_LOCATION }} \
              --custom-data cloudinit.yaml
      - name: Get Public IP
        id: get-ip
        uses: azure/CLI@v2
        with:
          inlineScript: |
            PUBLIC_IP=$(az vm show --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --show-details --query publicIps -o ts)
            echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
  cleanup-on-success:
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/CLI@v2
        with:
          inlineScript: |
            az group delete --name ${{ env.AZURE_RESOURCE_GROUP }} --yes --no-wait
