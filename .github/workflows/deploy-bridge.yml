name: Deploy Bridge VM with n8n

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Azure region (eastus or centralindia)'
        required: false
        default: 'eastus'
        type: choice
        options:
          - eastus
          - centralindia
  push:
    branches:
      - main

env:
  AZURE_RESOURCE_GROUP: bridge-rg-${{ github.run_id }}
  AZURE_VM_NAME: bridge-vm-${{ github.run_id }}
  AZURE_REGION: '${{ github.event.inputs.region || 'eastus' }}'

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    outputs:
      vm-public-ip: ${{ steps.get-ip.outputs.public-ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Create Resource Group
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_REGION }} \
              --tags "CreatedBy=GitHubActions" "WorkflowId=${{ github.run_id }}" "Environment=Bridge"
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy VM with Cloud-Init
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az vm create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_VM_NAME }} \
              --image Ubuntu2204 \
              --size Standard_B1s \
              --admin-username azureuser \
              --generate-ssh-keys \
              --custom-data cloud-init.yaml
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Wait and Get Public IP
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Wait for VM to be ready
            az vm wait --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --created
            # Get public IP and output it
            PUBLIC_IP=$(az vm show --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --show-details --query publicIps -o tsv)
            echo "VM Public IP: $PUBLIC_IP"
            echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Output VM Information
        run: |
          echo "VM Public IP: ${{ steps.get-ip.outputs.public-ip }}"
          echo "n8n URL: http://${{ steps.get-ip.outputs.public-ip }}:5678"

      - name: Cleanup on Failure
        if: failure()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Workflow failed, attempting cleanup..."
            echo "Keeping Resource Group: ${{ env.AZURE_RESOURCE_GROUP }} and VM: ${{ env.AZURE_VM_NAME }} for debugging"
            echo "To clean up manually, use:"
            echo "az group delete -n ${{ env.AZURE_RESOURCE_GROUP }} -yes"
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

cleanup-on-success:
  needs: deploy-vm
  runs-on: ubuntu-latest
  if: success() || failure()
  steps:
    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

    - name: Cleanup Resources
      uses: azure/CLI@v2
      with:
        inlineScript: |
          echo "Cleaning up resources..."
          az group delete \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --yes \
            --no-wait
      env:
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
