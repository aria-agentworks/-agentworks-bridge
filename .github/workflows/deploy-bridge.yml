name: Deploy Bridge VM with n8n

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Azure region (eastus, centralindia, or westeurope)'
        required: false
        default: 'eastus'
        type: choice
        options:
          - eastus
          - centralindia
          - westeurope
  push:
    branches:
      - main

env:
  FORKED_JAVASCRIPT_ACTION_TO_NODE24: 'true'
  AZURE_RESOURCE_GROUP: bridge-rg-${{ github.run_id }}
  AZURE_VM_NAME: bridge-vm-${{ github.run_id }}
  AZURE_LOCATION: ${{ github.event.inputs.region || 'centralindia' }}

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    outputs:
      vm-public-ip: ${{ steps.get-ip.outputs.public-ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }} \
              --tags "CreatedBy=GitHubActions" "WorkflowID=${{ github.run_id }}"

      - name: Deploy VM (with debug)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            az vm create \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_VM_NAME }} \
              --image Ubuntu2204 \
              --size Standard_B1ls \
              --admin-password "AgentWorks@2026!" \
              --authentication-type password \
              --location ${{ env.AZURE_LOCATION }}

      - name: Get Public IP
        id: get-ip
        uses: azure/CLI@v2
        with:
          inlineScript: |
            PUBLIC_IP=$(az vm show --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --show-details --query publicIps -o tsv)
            echo "VM Public IP: $PUBLIC_IP"
            echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Output VM Information
        run: |
          echo "VM Public IP: ${{ steps.get-ip.outputs.public-ip }}"
          echo "n8n URL: http://${{ steps.get-ip.outputs.public-ip }}:5678"

      - name: Cleanup on Failure
        if: failure() || cancelled()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Workflow failed, keeping resources for debugging"
            echo "To cleanup manually, use:"
            echo "az group delete -n ${{ env.AZURE_RESOURCE_GROUP }} --yes"

cleanup-on-success:
  needs: deploy-vm
  runs-on: ubuntu-latest
  if: always()
  steps:
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Cleanup Resources
      uses: azure/CLI@v2
      with:
        inlineScript: |
          echo "Cleaning up resources..."
          az group delete --name ${{ env.AZURE_RESOURCE_GROUP }} --yes --no-wait
