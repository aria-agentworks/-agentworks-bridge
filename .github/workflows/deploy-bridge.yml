name: Deploy Bridge VM with n8n

on:
  workflow_dispatch:
    inputs:
      region:
        description: 'Azure region (eastus, centralindia, or westeurope)'
        required: false
        default: 'eastus'
        type: choice
        options:
          - eastus
          - centralindia
          - westeurope
  push:
    branches:
      - main

env:
  FORKED_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  AZURE_RESOURCE_GROUP: bridge-rg-${{ github.run_id }}
  AZURE_VM_NAME: bridge-vm-${{ github.run_id }}
  AZURE_LOCATION: ${{ github.event.inputs.region || 'eastus' }}

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    outputs:
      vm-public-ip: ${{ steps.get-ip.outputs.public-ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.AZURE_RESOURCE_GROUP }} \
              --location ${{ env.AZURE_LOCATION }} \
              --tags "CreatedBy=GitHubActions" "WorkflowID=${{ github.run_id }}"

      - name: Deploy VM (with debugging)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # Retry loop for VM creation to avoid Azure CLI hang
            set -x
            for i in {1..3}; do
              echo "Attempting VM creation (attempt $i/3)..."
              az vm create \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --name ${{ env.AZURE_VM_NAME }} \
                --image Canonical:0001-com-ubuntu-server-jammy:22_04-lts:latest \
                --size Standard_B1s \
                --admin-password "AgentWorks123!" \
                --authentication-type password \
                --custom-data cloudinit.yml \
                --location ${{ env.AZURE_LOCATION }} \
                --no-wait
              if [ $? -eq 0 ]; then
                echo "VM creation command sent successfully"
                break
              else
                echo "Attempt $i failed, retrying in 30 seconds..."
                sleep 30
              fi
            done

      - name: Wait for VM
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Waiting for VM to be ready..."
            az vm wait --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --created --timeout 600
            echo "VM is ready!"

      - name: Get Public IP
        id: get-ip
        uses: azure/CLI@v2
        with:
          inlineScript: |
            PUBLIC_IP=$(az vm show --name ${{ env.AZURE_VM_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --show-details --query publicIps -o ts)
            echo "VM Public IP: $PUBLIC_IP"
            echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Output VM Information
        run: |
          echo "VM Public IP: ${{ steps.get-ip.outputs.public-ip }}"
          echo "n8n URL: http://${{ steps.get-ip.outputs.public-ip }}:5678"

      - name: Cleanup on Failure
        if: failure() || cancelled()
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Workflow failed, keeping resources for debugging"
            echo "To clean up manually, use:"
            echo "az group delete -n ${{ env.AZURE_RESOURCE_GROUP }} --yes"

  cleanup-on-success:
    needs: deploy-vm
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Cleanup Resources
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Cleaning up resources..."
            az group delete --name ${{ env.AZURE_RESOURCE_GROUP }} --yes --no-wait
