name: Logitech CVE-2026-41940 Scan
# Triggered by push - 2026-05-01T18:14:00+05:30 CVE-2026-41940 Scan
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/logitech-scan.yml'

jobs:
  scan-logitech:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install -r requirements.txt 2>/dev/null || true

      - name: Scan whm.logitech.com for CVE-2026-41940
        run: |
          echo "Starting CVE-2026-41940 scan for whm.logitech.com..."
          python3 scripts/cve_2026_41940_scan.py whm.logitech.com
          echo "Scan complete. Result should be in security_scan_whm.logitech.com.json"

      - name: Check scan results
        id: results
        run: |
          if [ -f "security_scan_whm.logitech.com.json" ]; then
            echo "STATUS=success" >> $GITHUB_OUTPUT
            echo "SCANNED=true" >> $GITHUB_OUTPUT
            cat security_scan_whm.logitech.com.json
          else
            echo "STATUS=failed" >> $GITHUB_OUTPUT
            echo "File not found!"
            ls -la
          fi

      - name: Commit and push scan results
        if: steps.results.outputs.SCANNED == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add security_scan_whm.logitech.com.json
          git commit -m "CVE-2026-41940 scan for whm.logitech.com" || echo "No changes to commit"
          git push origin main || echo "Push failed"

      - name: Display scan results
        run: |
          echo "=== Scan Results ==="
          cat security_scan_whm.logitech.com.json