name: Zero-Dep Bridge
on:
  push:
    paths:
      - 'tasks.txt'  
  workflow_dispatch:
jobs:
  run:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run bash tasks.txt
        run: bash tasks.txt
      - name: Git config user.email
        run: git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Git config user.name
        run: git config user.name "github-actions[bot]"
      - name: Git add result.txt
        run: git add result.txt
      - name: Git commit -m "gpt-pp-team deployment" || echo "No changes"
        run: git commit -m "gpt-pp-team deployment" || echo "No changes"
      - name: Configure PAT
        run: |
          git remote set-url origin https://aria-agentworks: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@github.com/aria-agentworks/-agentworks-bridge.git
      - name: Git push
        run: git push
