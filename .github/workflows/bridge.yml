name: Zero-Dep Bridge
on:
  push:
    paths:
      - 'tasks.txt'  
  workflow_dispatch:
jobs:
  run:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Zero-Dep Heartbeat
        run: |
          echo "=== ZERO-DEP HEARTBEAT SUCCESS $(date) ===" > result.txt
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "Zero-dep heartbeat" || echo "No changes"
          git push
