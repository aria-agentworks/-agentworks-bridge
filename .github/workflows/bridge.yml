name: Sidebar Bridge
on:
  push:
    paths:
      - 'tasks.txt'
  workflow_dispatch:
jobs:
  run-task:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Task Directly
        run: bash tasks.txt
      - name: Git config user.email
        run: git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Git config user.name
        run: git config user.name "github-actions[bot]"
      - name: Git add result.txt
        run: git add result.txt
      - name: Git commit
        run: git commit -m "Update results" || echo "No changes"
      - name: Git push
        run: git push