name: Strike Bridge
on:
  push:
    paths:
      - 'tasks.txt'
  workflow_dispatch:
jobs:
  run-task:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run Bridge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 main.py -once
