name: Security Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security-report:
    name: Generate Security Report
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate local security report
        run: python3 scripts/fingerprint.py loot-drop.io

      - name: Commit and push security scan results
        run: |
          git add security_scan_*.json
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Add security scan results" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
