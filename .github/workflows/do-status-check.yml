name: DO Status Check
on:
  push:
  workflow_dispatch:

jobs:
  check-droplet:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
    
      - name: Check Self-Hosted Runner Health Status
        run: |
          # Ping the self-hosted runner at 139.59.18.31
          PING_RESPONSE=$(curl -s -m 10 -o /dev/null -w "%{http_code}" http://139.59.18.31/health 2>/dev/null || echo "000")
          
          # Write to result.txt
          cat > result.txt << 'EOF'
== DO STATUS CHECK ==
EOF
          
          # Check if runner is healthy
          if [ "$PING_RESPONSE" = "200" ]; then
            echo "Status: HEALTHY" >> result.txt
            echo "Name: self-hosted-runner-139.59.18.31" >> result.txt
            echo "IP: 139.59.18.31" >> result.txt
            echo "Region: DigitalOcean" >> result.txt
            echo "ACTIVE" >> result.txt
            echo "=== READY FOR DEPLOYMENT ===" >> result.txt
            echo "=== COPY FAIL (CVE-2026-31431) & TOR BRIDGE READY ===" >> result.txt
          elif [ "$PING_RESPONSE" = "000" ]; then
            echo "Status: UNREACHABLE" >> result.txt
            echo "Name: self-hosted-runner-139.59.18.31" >> result.txt
            echo "IP: 139.59.18.31" >> result.txt
            echo "Region: DigitalOcean" >> result.txt
            echo "NOT HEALTHY" >> result.txt
            echo "Runner unreachable - status check failed" >> result.txt
          else
            echo "Status: ERROR (HTTP $PING_RESPONSE)" >> result.txt
            echo "Name: self-hosted-runner-139.59.18.31" >> result.txt
            echo "IP: 139.59.18.31" >> result.txt
            echo "Region: DigitalOcean" >> result.txt
            echo "ERROR" >> result.txt
            echo "Runner returned HTTP status: $PING_RESPONSE" >> result.txt
          fi
          
          echo "=== STATUS CHECK COMPLETE ===" >> result.txt
          
          # Display result
          cat result.txt

      - name: Commit result.txt
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add result.txt
          git commit -m "DO Status Check: $(date)" || echo "No changes"
          git push origin main || echo "Push failed"
